# dos/prod-1/importers/credentials/aws.yaml

# AWS Credentials — prod-1

aws:
  role_arn_env_var: OPSDB_AWS_ROLE_ARN
  external_id_env_var: OPSDB_AWS_EXTERNAL_ID
  access_key_id_env_var: AWS_ACCESS_KEY_ID
  secret_access_key_env_var: AWS_SECRET_ACCESS_KEY
  session_token_env_var: AWS_SESSION_TOKEN
  regions:
    - eu-west-1
    - eu-central-1


