# dos/prod-1/config.yaml

# OpsDB Substrate Configuration — prod-1
#
# Second production substrate. Same structure as prod-0 with different
# identity, database, and credentials. In a real deployment this might
# serve a different region, business unit, or security perimeter.

substrate:
  name: prod-1
  description: "Production OpsDB — secondary security perimeter"
  site_name: prod-1

database:
  dsn_env_var: OPSDB_PROD1_DSN
  max_open_connections: 25
  max_idle_connections: 5
  connection_max_lifetime_seconds: 300

api:
  listen_address: "0.0.0.0:8080"
  tls_cert_path: ""
  tls_key_path: ""
  auth_backends:
    - type: yaml
      config_path: auth/users.yaml
    - type: service_account
      config_path: ""
  max_request_body_bytes: 10485760
  request_timeout_seconds: 60
  audit_chain_hash_enabled: false

schema:
  repo_path: ../..

cross_references:
  known_substrates:
    - name: prod-0
      api_endpoint_env_var: OPSDB_PROD0_API_ENDPOINT
      description: "Production OpsDB — primary security perimeter"


