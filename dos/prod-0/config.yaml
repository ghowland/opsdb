# dos/prod-0/config.yaml

# OpsDB Substrate Configuration — prod-0
#
# This file is the root configuration for one OpsDB substrate instance.
# It tells the API where its database is, how to authenticate callers,
# and what site identity to use.

substrate:
  name: prod-0
  description: "Production OpsDB — primary security perimeter"
  site_name: prod-0

database:
  # DSN resolved from environment variable at startup.
  # The API reads this env var, never stores the DSN in config files.
  dsn_env_var: OPSDB_PROD0_DSN
  # Connection pool settings
  max_open_connections: 25
  max_idle_connections: 5
  connection_max_lifetime_seconds: 300

api:
  listen_address: "0.0.0.0:8080"
  # TLS — in production, terminate TLS at the API or at a load balancer.
  # Paths are relative to this config file's directory.
  tls_cert_path: ""
  tls_key_path: ""
  # Auth backend: "yaml" for bootstrap/dev, "oidc" for production humans,
  # "service_account" for runners. Multiple backends can be configured;
  # the API tries each in order.
  auth_backends:
    - type: yaml
      config_path: auth/users.yaml
    - type: service_account
      config_path: ""  # uses OPSDB_SA_SIGNING_KEY env var
  # Request limits
  max_request_body_bytes: 10485760  # 10MB
  request_timeout_seconds: 60
  # Audit
  audit_chain_hash_enabled: false  # enable for tamper-evidence regimes

schema:
  # Path to the schema repository root, relative to this config file.
  repo_path: ../..

# Cross-substrate references (for N > 1 deployments)
cross_references:
  known_substrates:
    - name: prod-1
      api_endpoint_env_var: OPSDB_PROD1_API_ENDPOINT
      description: "Production OpsDB — secondary security perimeter"


