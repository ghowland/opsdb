# dos/prod-0/seed/runner_service_accounts.yaml

# Runner Service Accounts — prod-0
#
# Each runner authenticates to the API using a service account.
# These seed records create the ops_user entries that service account
# tokens resolve to. The actual tokens are issued by the secret backend
# and referenced via environment variables — never stored here.
#
# Runner authority is data, not code: the runner_capability and
# runner_*_target rows (created via change sets after bootstrap)
# define what each runner is allowed to do.

entity_type: ops_user
records:
  - username: sa-change_set_executor
    display_name: "Change Set Executor Service Account"
    email: ""
    auth_source: service_account
    is_active: true

  - username: sa-schema_executor
    display_name: "Schema Executor Service Account"
    email: ""
    auth_source: service_account
    is_active: true

