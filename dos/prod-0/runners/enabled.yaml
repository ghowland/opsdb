# dos/prod-0/runners/enabled.yaml

# Enabled Runners — prod-0
#
# Controls which runners are deployed for this substrate.
# Each runner reads its spec from OpsDB (seeded via core_runner_specs.yaml)
# and its overrides from the overrides/ directory.

runners:
  # Self-management runners (required for OpsDB to operate itself)
  - name: change_set_executor
    enabled: true
    instances: 1
    service_account: sa-change_set_executor

  - name: schema_executor
    enabled: true
    instances: 1
    service_account: sa-schema_executor

  - name: reaper
    enabled: true
    instances: 1
    service_account: sa-reaper

  - name: emergency_review_monitor
    enabled: true
    instances: 1
    service_account: sa-emergency_review_monitor

  - name: notification_runner
    enabled: true
    instances: 1
    service_account: sa-notification_runner


