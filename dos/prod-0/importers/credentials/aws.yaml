# dos/prod-0/importers/credentials/aws.yaml

# AWS Credentials — prod-0
#
# Never stores actual credentials. References environment variables
# or IAM role ARNs. The importer reads these references at runtime
# and uses the AWS SDK credential chain.

aws:
  # Primary method: IAM role assumed by the importer process.
  # Falls back to environment variables if role_arn is empty.
  role_arn_env_var: OPSDB_AWS_ROLE_ARN
  external_id_env_var: OPSDB_AWS_EXTERNAL_ID

  # Fallback: explicit credentials via environment (dev/bootstrap only)
  access_key_id_env_var: AWS_ACCESS_KEY_ID
  secret_access_key_env_var: AWS_SECRET_ACCESS_KEY
  session_token_env_var: AWS_SESSION_TOKEN

  # Regions to import from
  regions:
    - us-east-1
    - us-west-2


