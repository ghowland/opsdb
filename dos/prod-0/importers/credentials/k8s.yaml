# dos/prod-0/importers/credentials/k8s.yaml

# Kubernetes Credentials — prod-0
#
# References kubeconfig files or in-cluster service account tokens.
# Never stores tokens directly.

kubernetes:
  auth_method: kubeconfig  # kubeconfig or in_cluster
  # For kubeconfig method: environment variable pointing to kubeconfig file
  kubeconfig_env_var: KUBECONFIG
  # Specific cluster contexts to use (empty = use current context)
  contexts:
    - prod-us-east-1
    - prod-us-west-2


