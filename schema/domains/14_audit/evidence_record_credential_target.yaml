
# === evidence_record_credential_target.yaml ===
name: evidence_record_credential_target
description: "Bridge: evidence record to credential with per-target status. Credential entity referenced externally."
category: audit
versioned: false
soft_delete: false
hierarchical: false

fields:
  - name: evidence_record_id
    type: foreign_key
    references: evidence_record
    nullable: false
    description: "Evidence record"

  - name: credential_id
    type: int
    nullable: false
    min_value: 1
    max_value: 2147483647
    description: "FK to credential entity (externally referenced)"

  - name: per_target_status
    type: varchar
    max_length: 255
    nullable: false
    description: "Outcome for this specific credential"

  - name: per_target_data_json
    type: json
    json_type_discriminator: per_target_status
    nullable: true
    description: "Target-specific evidence detail"

indexes:
  - fields: [evidence_record_id]
  - fields: [credential_id]

governance: {}

