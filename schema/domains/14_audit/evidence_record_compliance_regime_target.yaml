
# === evidence_record_compliance_regime_target.yaml ===
name: evidence_record_compliance_regime_target
description: "Bridge: evidence record to compliance regime with per-target status."
category: audit
versioned: false
soft_delete: false
hierarchical: false

fields:
  - name: evidence_record_id
    type: foreign_key
    references: evidence_record
    nullable: false
    description: "Evidence record"

  - name: compliance_regime_id
    type: foreign_key
    references: compliance_regime
    nullable: false
    description: "Compliance regime this evidence applies to"

  - name: per_target_status
    type: varchar
    max_length: 255
    nullable: false
    description: "Outcome for this specific regime"

  - name: per_target_data_json
    type: json
    json_type_discriminator: per_target_status
    nullable: true
    description: "Target-specific evidence detail"

indexes:
  - fields: [evidence_record_id]
  - fields: [compliance_regime_id]

governance: {}

