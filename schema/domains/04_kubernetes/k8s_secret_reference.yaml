
# === k8s_secret_reference.yaml ===
name: k8s_secret_reference
description: "Pointer to a Kubernetes secret. Never holds the secret value. Points to secret backend where actual value lives."
category: k8s
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: k8s_cluster_id
    type: foreign_key
    references: k8s_cluster
    nullable: false
    description: "Cluster this secret exists in"

  - name: k8s_namespace_id
    type: foreign_key
    references: k8s_namespace
    nullable: false
    description: "Namespace this secret exists in"

  - name: name
    type: varchar
    max_length: 255
    nullable: false
    description: "Secret name in Kubernetes"
    must_be_unique_within:
      - k8s_namespace_id

  - name: secret_type
    type: enum
    enum_values:
      - opaque
      - tls
      - dockerconfigjson
      - service_account_token
      - basic_auth
    nullable: false
    description: "Kubernetes secret type"

  - name: secret_backend_id
    type: foreign_key
    references: authority
    nullable: false
    description: "Authority of type secret_vault where actual secret value lives"

  - name: secret_backend_path
    type: varchar
    max_length: 1024
    nullable: false
    description: "Path within secret backend to actual value. Never the value itself."

indexes:
  - fields: [k8s_cluster_id]
  - fields: [k8s_namespace_id]
  - fields: [secret_backend_id]

governance:
  _access_classification: true

