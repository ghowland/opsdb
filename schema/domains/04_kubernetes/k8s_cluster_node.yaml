
# === k8s_cluster_node.yaml ===
name: k8s_cluster_node
description: "Node in a Kubernetes cluster. Bridges to machine for substrate awareness."
category: k8s
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: k8s_cluster_id
    type: foreign_key
    references: k8s_cluster
    nullable: false
    description: "Cluster this node belongs to"

  - name: machine_id
    type: foreign_key
    references: machine
    nullable: false
    description: "Underlying machine in substrate hierarchy"

  - name: node_role
    type: enum
    enum_values:
      - control_plane
      - worker
      - etcd
      - ingress
    nullable: false
    description: "Node role in cluster"

  - name: is_schedulable
    type: boolean
    nullable: false
    default: true
    description: "Whether pods can be scheduled on this node"

  - name: joined_time
    type: datetime
    nullable: true
    description: "When this node joined the cluster"

indexes:
  - fields: [k8s_cluster_id]
  - fields: [machine_id]
  - fields: [k8s_cluster_id, node_role]

governance: {}

