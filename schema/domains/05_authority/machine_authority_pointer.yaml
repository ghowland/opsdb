
# === machine_authority_pointer.yaml ===
name: machine_authority_pointer
description: "Bridge: machine to authority pointer with relationship role."
category: authority
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: machine_id
    type: foreign_key
    references: machine
    nullable: false
    description: "Machine"

  - name: authority_pointer_id
    type: foreign_key
    references: authority_pointer
    nullable: false
    description: "Authority pointer"

  - name: relationship_role
    type: varchar
    max_length: 255
    nullable: false
    description: "How this pointer relates to the machine"

indexes:
  - fields: [machine_id]
  - fields: [authority_pointer_id]
  - fields: [machine_id, authority_pointer_id]
    unique: true

governance: {}

