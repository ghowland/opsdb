
# === cloud_resource_authority_pointer.yaml ===
name: cloud_resource_authority_pointer
description: "Bridge: cloud resource to authority pointer with relationship role."
category: authority
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: cloud_resource_id
    type: foreign_key
    references: cloud_resource
    nullable: false
    description: "Cloud resource"

  - name: authority_pointer_id
    type: foreign_key
    references: authority_pointer
    nullable: false
    description: "Authority pointer"

  - name: relationship_role
    type: varchar
    max_length: 255
    nullable: false
    description: "How this pointer relates to the cloud resource"

indexes:
  - fields: [cloud_resource_id]
  - fields: [authority_pointer_id]
  - fields: [cloud_resource_id, authority_pointer_id]
    unique: true

governance: {}
