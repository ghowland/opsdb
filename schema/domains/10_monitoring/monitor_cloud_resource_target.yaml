
# === monitor_cloud_resource_target.yaml ===
name: monitor_cloud_resource_target
description: "Bridge: monitor to cloud resource. Applies a monitor to a specific cloud resource."
category: monitor
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: monitor_id
    type: foreign_key
    references: monitor
    nullable: false
    description: "Monitor"

  - name: cloud_resource_id
    type: foreign_key
    references: cloud_resource
    nullable: false
    description: "Target cloud resource"

indexes:
  - fields: [monitor_id]
  - fields: [cloud_resource_id]
  - fields: [monitor_id, cloud_resource_id]
    unique: true

governance: {}

