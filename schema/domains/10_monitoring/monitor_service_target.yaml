
# === monitor_service_target.yaml ===
name: monitor_service_target
description: "Bridge: monitor to service. Applies a monitor to a specific service."
category: monitor
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: monitor_id
    type: foreign_key
    references: monitor
    nullable: false
    description: "Monitor"

  - name: service_id
    type: foreign_key
    references: service
    nullable: false
    description: "Target service"

indexes:
  - fields: [monitor_id]
  - fields: [service_id]
  - fields: [monitor_id, service_id]
    unique: true

governance: {}

