
# === runner_job_target_cloud_resource.yaml ===
name: runner_job_target_cloud_resource
description: "Bridge: runner job to cloud resource with per-target status."
category: runner
versioned: false
soft_delete: false
hierarchical: false

fields:
  - name: runner_job_id
    type: foreign_key
    references: runner_job
    nullable: false
    description: "Runner job"

  - name: cloud_resource_id
    type: foreign_key
    references: cloud_resource
    nullable: false
    description: "Target cloud resource"

  - name: per_target_status
    type: varchar
    max_length: 255
    nullable: false
    description: "Outcome for this specific target"

  - name: per_target_data_json
    type: json
    json_type_discriminator: per_target_status
    nullable: true
    description: "Target-specific detail"

indexes:
  - fields: [runner_job_id]
  - fields: [cloud_resource_id]

governance: {}

