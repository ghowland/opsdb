
# === runner_job_target_machine.yaml ===
name: runner_job_target_machine
description: "Bridge: runner job to machine with per-target status. Records what happened to each machine this job touched."
category: runner
versioned: false
soft_delete: false
hierarchical: false

fields:
  - name: runner_job_id
    type: foreign_key
    references: runner_job
    nullable: false
    description: "Runner job"

  - name: machine_id
    type: foreign_key
    references: machine
    nullable: false
    description: "Target machine"

  - name: per_target_status
    type: varchar
    max_length: 255
    nullable: false
    description: "Outcome for this specific target"

  - name: per_target_data_json
    type: json
    json_type_discriminator: per_target_status
    nullable: true
    description: "Target-specific detail"

indexes:
  - fields: [runner_job_id]
  - fields: [machine_id]

governance: {}

