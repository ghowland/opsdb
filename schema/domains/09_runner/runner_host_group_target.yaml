
# === runner_host_group_target.yaml ===
name: runner_host_group_target
description: "Bridge: runner spec to host group. Declares which host groups this runner is authorized to act on."
category: runner
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: runner_spec_id
    type: foreign_key
    references: runner_spec
    nullable: false
    description: "Runner spec"

  - name: host_group_id
    type: foreign_key
    references: host_group
    nullable: false
    description: "Target host group"

indexes:
  - fields: [runner_spec_id]
  - fields: [host_group_id]
  - fields: [runner_spec_id, host_group_id]
    unique: true

governance: {}

