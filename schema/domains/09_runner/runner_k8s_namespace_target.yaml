
# === runner_k8s_namespace_target.yaml ===
name: runner_k8s_namespace_target
description: "Bridge: runner spec to Kubernetes namespace. Declares which namespaces this runner is authorized to act on."
category: runner
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: runner_spec_id
    type: foreign_key
    references: runner_spec
    nullable: false
    description: "Runner spec"

  - name: k8s_namespace_id
    type: foreign_key
    references: k8s_namespace
    nullable: false
    description: "Target Kubernetes namespace"

indexes:
  - fields: [runner_spec_id]
  - fields: [k8s_namespace_id]
  - fields: [runner_spec_id, k8s_namespace_id]
    unique: true

governance: {}

