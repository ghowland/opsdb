# === approval_rule.yaml ===
name: approval_rule
description: "Policy declaring approval requirements per change. Matching predicate plus required approver groups. Change-managed itself."
category: policy
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: site_id
    type: foreign_key
    references: site
    nullable: false
    description: "Owning site"

  - name: name
    type: varchar
    max_length: 255
    nullable: false
    description: "Approval rule name"
    must_be_unique_within:
      - site_id

  - name: rule_data_json
    type: json
    json_type_discriminator: name
    nullable: false
    description: "Matching predicate and approval requirements. Which entity types, namespaces, fields, metadata trigger this rule and what approver groups are required."

indexes:
  - fields: [site_id]

governance:
  _requires_group: true

