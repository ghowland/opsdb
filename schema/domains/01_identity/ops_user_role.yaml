
# === ops_user_role.yaml ===
name: ops_user_role
description: "Operational position or role. Used for authorization layer 1, ownership bridges, on-call assignments, and approval routing."
category: identity
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: site_id
    type: foreign_key
    references: site
    nullable: false
    description: "Site this role belongs to"

  - name: name
    type: varchar
    max_length: 255
    nullable: false
    description: "Unique role name within site"
    must_be_unique_within:
      - site_id

  - name: description
    type: text
    nullable: true
    description: "Purpose and responsibilities of this role"

indexes:
  - fields: [site_id]

governance: {}


