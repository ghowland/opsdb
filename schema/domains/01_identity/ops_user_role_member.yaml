
# === ops_user_role_member.yaml ===
name: ops_user_role_member
description: "Bridge: role to user assignment with optional rotation order for on-call."
category: identity
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: ops_user_role_id
    type: foreign_key
    references: ops_user_role
    nullable: false
    description: "Role"

  - name: ops_user_id
    type: foreign_key
    references: ops_user
    nullable: false
    description: "User filling this role"

  - name: rotation_order
    type: int
    nullable: true
    min_value: 0
    max_value: 9999
    description: "Position in on-call rotation. Null if role is not rotated."

indexes:
  - fields: [ops_user_role_id, ops_user_id]
    unique: true
  - fields: [ops_user_id]

governance: {}

