
# === service_stakeholder.yaml ===
name: service_stakeholder
description: "Bridge: service to ops_user_role with stakeholder role. Non-ownership interest. Consumer, dependency owner, compliance reviewer, security reviewer."
category: docs
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: service_id
    type: foreign_key
    references: service
    nullable: false
    description: "Service"

  - name: ops_user_role_id
    type: foreign_key
    references: ops_user_role
    nullable: false
    description: "Role with stakeholder interest"

  - name: stakeholder_role
    type: enum
    enum_values:
      - consumer
      - dependency_owner
      - compliance_reviewer
      - security_reviewer
    nullable: false
    description: "Nature of stakeholder interest"

indexes:
  - fields: [service_id]
  - fields: [ops_user_role_id]
  - fields: [service_id, ops_user_role_id, stakeholder_role]
    unique: true

governance: {}

