
# === cloud_resource_ownership.yaml ===
name: cloud_resource_ownership
description: "Bridge: cloud resource to ops_user_role with ownership role."
category: docs
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: cloud_resource_id
    type: foreign_key
    references: cloud_resource
    nullable: false
    description: "Cloud resource"

  - name: ops_user_role_id
    type: foreign_key
    references: ops_user_role
    nullable: false
    description: "Role that owns this cloud resource"

  - name: ownership_role
    type: varchar
    max_length: 255
    nullable: false
    description: "Type of ownership"

indexes:
  - fields: [cloud_resource_id]
  - fields: [ops_user_role_id]
  - fields: [cloud_resource_id, ops_user_role_id]
    unique: true

governance: {}

