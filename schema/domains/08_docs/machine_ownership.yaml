
# === machine_ownership.yaml ===
name: machine_ownership
description: "Bridge: machine to ops_user_role with ownership role."
category: docs
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: machine_id
    type: foreign_key
    references: machine
    nullable: false
    description: "Machine"

  - name: ops_user_role_id
    type: foreign_key
    references: ops_user_role
    nullable: false
    description: "Role that owns this machine"

  - name: ownership_role
    type: varchar
    max_length: 255
    nullable: false
    description: "Type of ownership"

indexes:
  - fields: [machine_id]
  - fields: [ops_user_role_id]
  - fields: [machine_id, ops_user_role_id]
    unique: true

governance: {}

