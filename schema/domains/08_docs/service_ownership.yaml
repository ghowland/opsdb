
# === service_ownership.yaml ===
name: service_ownership
description: "Bridge: service to ops_user_role with ownership role. Owner, technical owner, business owner, support owner."
category: docs
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: service_id
    type: foreign_key
    references: service
    nullable: false
    description: "Service"

  - name: ops_user_role_id
    type: foreign_key
    references: ops_user_role
    nullable: false
    description: "Role that owns this service"

  - name: ownership_role
    type: enum
    enum_values:
      - owner
      - technical_owner
      - business_owner
      - support_owner
    nullable: false
    description: "Type of ownership"

indexes:
  - fields: [service_id]
  - fields: [ops_user_role_id]
  - fields: [service_id, ops_user_role_id, ownership_role]
    unique: true

governance: {}

