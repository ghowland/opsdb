
# === credential_rotation_schedule.yaml ===
name: credential_rotation_schedule
description: "Bridge: credential to schedule. Defines when a credential should be rotated. Credential entity referenced externally."
category: schedule
versioned: false
soft_delete: true
hierarchical: false

fields:
  - name: credential_id
    type: int
    nullable: false
    min_value: 1
    max_value: 2147483647
    description: "FK to credential entity (externally referenced, not detailed in this schema)"

  - name: schedule_id
    type: foreign_key
    references: schedule
    nullable: false
    description: "Rotation schedule"

indexes:
  - fields: [credential_id]
    unique: true
  - fields: [schedule_id]

governance: {}

