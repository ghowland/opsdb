
# === manual.yaml ===
name: manual
description: "JSON schema for schedule of type manual. Not automatically triggered. Run on demand by human or external trigger."
discriminator_field: schedule_type
discriminator_value: manual

fields:
  - name: trigger_method
    type: string
    allowed_values: [api_call, cli_invocation, webhook, human_button]
    required: true
    description: "How the manual run is triggered"

  - name: requires_confirmation
    type: boolean
    required: true
    description: "Whether the trigger requires explicit confirmation before execution"

  - name: confirmation_message
    type: string
    max_length: 1024
    required: false
    description: "Message shown to human before confirmation"

  - name: cooldown_seconds
    type: int
    min_value: 0
    max_value: 86400
    required: false
    description: "Minimum seconds between manual invocations. Prevents accidental rapid re-runs."

  - name: authorized_roles
    type: string
    max_length: 2048
    required: false
    description: "Comma-separated role names allowed to trigger. Empty means any authenticated user."

  - name: log_trigger_reason
    type: boolean
    required: true
    description: "Whether the triggering user must provide a reason text"

