
# === credential_rotator.yaml ===
name: credential_rotator
description: "JSON schema for runner_spec of type credential_rotator. Rotates credentials on schedule."
discriminator_field: runner_spec_type
discriminator_value: credential_rotator

fields:
  - name: credential_types
    type: string
    max_length: 1024
    required: true
    description: "Comma-separated credential types to rotate. database_password, api_key, ssh_key, etc."

  - name: rotation_method
    type: string
    allowed_values: [vault_rotate, sdk_rotate, custom_script]
    required: true
    description: "How rotation is performed"

  - name: pre_rotation_validation
    type: boolean
    required: true
    description: "Whether to validate current credential works before rotating"

  - name: post_rotation_validation
    type: boolean
    required: true
    description: "Whether to validate new credential works after rotating"

  - name: max_rotations_per_cycle
    type: int
    min_value: 1
    max_value: 1000
    required: true

  - name: max_cycle_duration_seconds
    type: int
    min_value: 30
    max_value: 3600
    required: true

  - name: max_retries_per_rotation
    type: int
    min_value: 0
    max_value: 5
    required: true

  - name: rollback_on_validation_failure
    type: boolean
    required: true
    description: "Whether to restore old credential when post-rotation validation fails"

