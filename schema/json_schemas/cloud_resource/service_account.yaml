

# === service_account.yaml ===
name: service_account
description: "GCP IAM service account payload"
discriminator_field: cloud_resource_type
discriminator_value: service_account

fields:
  - name: email
    type: string
    max_length: 512
    required: true
  - name: display_name
    type: string
    max_length: 255
    required: false
  - name: is_disabled
    type: boolean
    required: true
  - name: key_count
    type: int
    min_value: 0
    max_value: 10
    required: false
  - name: iam_bindings_count
    type: int
    min_value: 0
    max_value: 1000
    required: false
