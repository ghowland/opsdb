
# === code_repository.yaml ===
name: code_repository
description: "JSON schema for authority of type code_repository"
discriminator_field: authority_type
discriminator_value: code_repository

fields:
  - name: provider_type
    type: string
    allowed_values:
      - github
      - gitlab
      - bitbucket
      - gitea
      - azure_devops
    required: true
    description: "Git hosting provider"

  - name: organization
    type: string
    max_length: 255
    required: true
    description: "Organization or group name"

  - name: default_branch
    type: string
    max_length: 255
    required: false
    description: "Default branch name. main, master, develop."

  - name: api_version
    type: string
    max_length: 50
    required: false
    description: "Provider API version"

