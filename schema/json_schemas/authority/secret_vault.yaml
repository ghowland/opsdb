
# === secret_vault.yaml ===
name: secret_vault
description: "JSON schema for authority of type secret_vault"
discriminator_field: authority_type
discriminator_value: secret_vault

fields:
  - name: vault_type
    type: string
    allowed_values:
      - hashicorp_vault
      - aws_secrets_manager
      - gcp_secret_manager
      - azure_key_vault
    required: true
    description: "Secret backend implementation"

  - name: version
    type: string
    max_length: 50
    required: false
    description: "Backend version"

  - name: auth_method
    type: string
    allowed_values:
      - token
      - approle
      - kubernetes
      - iam
      - oidc
      - ldap
    required: true
    description: "How runners authenticate to the vault"

  - name: default_mount_path
    type: string
    max_length: 512
    required: false
    description: "Default secret engine mount path"

  - name: rotation_supported
    type: boolean
    required: true
    description: "Whether the backend supports automated credential rotation"

