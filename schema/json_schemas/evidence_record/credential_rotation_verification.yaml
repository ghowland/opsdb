
# === credential_rotation_verification.yaml ===
name: credential_rotation_verification
description: "JSON schema for evidence_record of type credential_rotation_verification"
discriminator_field: evidence_record_type
discriminator_value: credential_rotation_verification

fields:
  - name: credential_path
    type: string
    max_length: 1024
    required: true
    description: "Secret backend path of the credential. Never the credential value."

  - name: credential_type
    type: string
    allowed_values: [database_password, api_key, service_account_key, ssh_key, tls_private_key, oauth_secret, encryption_key]
    required: true
    description: "What kind of credential"

  - name: was_rotated
    type: boolean
    required: true
    description: "Whether the credential was rotated within the required window"

  - name: last_rotated_time
    type: string
    max_length: 30
    required: true
    description: "ISO 8601 timestamp of the most recent rotation"

  - name: rotation_schedule_interval_days
    type: int
    min_value: 1
    max_value: 365
    required: true
    description: "Required rotation interval in days"

  - name: days_since_rotation
    type: int
    min_value: 0
    required: true
    description: "Days elapsed since last rotation at time of check"

  - name: is_overdue
    type: boolean
    required: true
    description: "Whether days_since_rotation exceeds rotation_schedule_interval_days"

  - name: rotation_method
    type: string
    allowed_values: [automated, manual, unknown]
    required: false
    description: "How the rotation was performed"

