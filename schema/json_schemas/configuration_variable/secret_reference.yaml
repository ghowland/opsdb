
# === secret_reference.yaml ===
name: secret_reference
description: "JSON schema for configuration_variable of type secret_reference. Points to a secret in a secret backend. Never contains the actual secret value."
discriminator_field: variable_type
discriminator_value: secret_reference

fields:
  - name: secret_backend_authority_id
    type: int
    required: true
    description: "ID of the authority row (type secret_vault) where the secret lives"

  - name: secret_path
    type: string
    max_length: 1024
    required: true
    description: "Path within the secret backend. vault:secret/data/myapp/db_password, aws-sm:myapp/db_password, etc."

  - name: secret_key
    type: string
    max_length: 255
    required: false
    description: "Specific key within the secret if the secret backend stores key-value pairs at the path"

  - name: secret_version
    type: string
    max_length: 255
    required: false
    description: "Specific version or rotation ID. Null for latest."

  - name: rotation_schedule_id
    type: int
    required: false
    description: "ID of the credential_rotation_schedule governing this secret's rotation"

  - name: last_rotated_time
    type: string
    max_length: 30
    required: false
    description: "ISO 8601 timestamp of last known rotation. Metadata only — actual rotation verified by evidence runners."
    