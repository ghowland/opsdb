
# === script_local.yaml ===
name: script_local
description: "JSON schema for monitor of type script_local. Script executed on the monitored host by a local agent."
discriminator_field: monitor_type
discriminator_value: script_local

fields:
  - name: script_path
    type: string
    max_length: 1024
    required: true
    description: "Path to script on the monitored host"

  - name: script_interpreter
    type: string
    allowed_values: [bash, sh, python3, perl, ruby, powershell]
    required: true
    description: "Interpreter to execute the script"

  - name: timeout_seconds
    type: int
    min_value: 1
    max_value: 300
    required: true
    description: "Maximum execution time before timeout"

  - name: expected_exit_code
    type: int
    min_value: 0
    max_value: 255
    required: true
    description: "Exit code that indicates healthy. Typically 0."

  - name: arguments
    type: string
    max_length: 2048
    required: false
    description: "Command-line arguments passed to the script"

  - name: run_as_user
    type: string
    max_length: 255
    required: false
    description: "User to execute the script as. Null for default runner user."

  - name: parse_output
    type: boolean
    required: false
    description: "Whether to parse stdout as structured metric data"

  - name: output_format
    type: string
    allowed_values: [nagios, prometheus_text, json_kv, plain]
    required: false
    description: "Format of parsed output when parse_output is true"

